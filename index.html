<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathtime</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f0; --card: #fff; --text: #1a1a18; --text-sub: #5f5e5a; --text-muted: #888780;
  --border: #d3d1c7; --border-strong: #b4b2a9; --input-bg: #fff;
  --accent: #378add; --accent-bg: #e6f1fb; --accent-text: #185fa5;
  --green-bg: #eaf3de; --green-text: #3b6d11;
  --red-bg: #fcebeb; --red-text: #a32d2d;
  --gray-bg: #e8e8e3; --hover-bg: #f5f5f0; --divider: #e8e8e3;
}
[data-theme="dark"] {
  --bg: #1a1a18; --card: #242422; --text: #f0efe9; --text-sub: #b8b6ad; --text-muted: #8a887f;
  --border: #3a3935; --border-strong: #4a4944; --input-bg: #2c2b28;
  --accent: #5b9fe0; --accent-bg: #1d2c3a; --accent-text: #7ab4ec;
  --green-bg: #1f2e16; --green-text: #8bc457;
  --red-bg: #321a1a; --red-text: #e08080;
  --gray-bg: #333230; --hover-bg: #2c2b28; --divider: #3a3935;
}
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; transition: background 0.2s, color 0.2s; }
.wrap { width: 100%; max-width: 480px; padding: 1.5rem 1rem; }
.card { background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.5rem; }
.center { text-align: center; }
h1 { font-size: 20px; font-weight: 500; margin-bottom: 6px; }
.sub { font-size: 14px; color: var(--text-sub); margin-bottom: 1.5rem; }
label { display: block; font-size: 13px; color: var(--text-sub); margin-bottom: 4px; margin-top: 12px; text-align: left; }
label:first-of-type { margin-top: 0; }
input[type="text"], input[type="password"] { width: 100%; padding: 10px 12px; border: 0.5px solid var(--border-strong); border-radius: 8px; font-size: 15px; font-family: inherit; background: var(--input-bg); color: var(--text); }
input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-bg); }
button.primary { width: 100%; padding: 10px; background: var(--text); color: var(--bg); border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; margin-top: 14px; }
button.primary:hover { opacity: 0.85; }
button.secondary { padding: 6px 14px; background: var(--card); color: var(--text); border: 0.5px solid var(--border-strong); border-radius: 8px; font-size: 13px; cursor: pointer; font-family: inherit; }
button.secondary:hover { background: var(--hover-bg); }
.link-btn { background: none; border: none; color: var(--accent-text); font-size: 13px; cursor: pointer; font-family: inherit; margin-top: 14px; text-decoration: underline; }
.download { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px; background: var(--text); color: var(--bg); border-radius: 8px; font-size: 15px; font-weight: 500; text-decoration: none; margin-bottom: 1rem; }
.download:hover { opacity: 0.85; }
.answer-row { display: flex; gap: 8px; }
.answer-row input { flex: 1; }
.answer-row button { padding: 10px 20px; background: var(--text); color: var(--bg); border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; white-space: nowrap; }
.msg { padding: 10px 14px; border-radius: 8px; font-size: 14px; margin-top: 12px; }
.msg-ok { background: var(--green-bg); color: var(--green-text); }
.msg-err { background: var(--red-bg); color: var(--red-text); }
.top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; gap: 8px; }
.top-name { font-size: 15px; font-weight: 500; }
.badge { display: inline-block; padding: 3px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; background: var(--accent-bg); color: var(--accent-text); margin-left: 8px; }
.big-icon { font-size: 40px; margin-bottom: 12px; }
.prob-label { font-size: 13px; color: var(--text-sub); margin-bottom: 4px; }
.prob-name { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
.theme-btn { width: 32px; height: 32px; border-radius: 8px; border: 0.5px solid var(--border-strong); background: var(--card); color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.theme-btn:hover { background: var(--hover-bg); }
.header-actions { display: flex; gap: 6px; align-items: center; }
.tabs { display: flex; gap: 6px; margin-bottom: 1rem; }
.tab-btn { flex: 1; padding: 8px; border-radius: 8px; border: 0.5px solid var(--border-strong); background: var(--card); color: var(--text-sub); font-size: 13px; cursor: pointer; font-family: inherit; }
.tab-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.history-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 0.5px solid var(--divider); font-size: 13px; }
.history-item:last-child { border-bottom: none; }
.history-num { color: var(--text-muted); min-width: 40px; }
.history-ans { color: var(--text-sub); flex: 1; }
.msg-toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); background: var(--accent-text); color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 14px; box-shadow: 0 4px 14px rgba(0,0,0,0.2); z-index: 200; max-width: 90%; text-align: center; animation: slideDown 0.3s ease; }
@keyframes slideDown { from { opacity: 0; transform: translate(-50%, -10px); } to { opacity: 1; transform: translate(-50%, 0); } }
.redirect-box { text-align: center; padding: 2rem 0; }
</style>
</head>
<body>
<div class="wrap">

  <!-- 로그인 화면 -->
  <div id="screen-login" class="card center">
    <h1>Mathtime</h1>
    <p class="sub">로그인하고 시작하세요</p>
    <label>닉네임</label>
    <input type="text" id="login-nick" placeholder="닉네임" onkeydown="if(event.key==='Enter')doLogin()">
    <label>비밀번호</label>
    <input type="password" id="login-pw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="primary" onclick="doLogin()">로그인</button>
    <button class="link-btn" onclick="showSignup()">계정이 없으신가요? 회원가입</button>
    <div id="login-msg"></div>
  </div>

  <!-- 회원가입 화면 -->
  <div id="screen-signup" class="card center" style="display:none">
    <h1>회원가입</h1>
    <p class="sub">닉네임과 비밀번호를 정하세요</p>
    <label>닉네임</label>
    <input type="text" id="signup-nick" placeholder="닉네임" onkeydown="if(event.key==='Enter')doSignup()">
    <label>비밀번호</label>
    <input type="password" id="signup-pw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doSignup()">
    <button class="primary" onclick="doSignup()">회원가입</button>
    <button class="link-btn" onclick="showLogin()">이미 계정이 있으신가요? 로그인</button>
    <div id="signup-msg"></div>
  </div>

  <!-- 어드민 리다이렉트 화면 -->
  <div id="screen-redirect" class="card redirect-box" style="display:none">
    <h1 style="font-size:18px">어드민 계정이에요</h1>
    <p class="sub">어드민 페이지로 이동할게요</p>
  </div>

  <!-- 게임 화면 -->
  <div id="screen-game" style="display:none">
    <div class="card">
      <div class="top-row">
        <div>
          <span class="top-name" id="g-name"></span>
          <span class="badge" id="g-badge"></span>
        </div>
        <div class="header-actions">
          <button class="theme-btn" id="theme-toggle" onclick="toggleTheme()">🌙</button>
          <button class="secondary" onclick="logout()">로그아웃</button>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" id="tab-quiz" onclick="switchTab('quiz')">문제</button>
        <button class="tab-btn" id="tab-mypage" onclick="switchTab('mypage')">내 정보</button>
      </div>

      <div id="panel-quiz">
        <div id="g-waiting" class="center" style="padding:2rem 0">
          <h1 style="font-size:18px">세션 대기 중</h1>
          <p class="sub" style="margin-bottom:0">어드민이 세션을 시작하면 문제가 나타나요</p>
        </div>

        <div id="g-active" style="display:none">
          <div class="prob-label" id="g-prob-label"></div>
          <div class="prob-name" id="g-prob-name"></div>
          <a id="g-download" href="#" target="_blank" class="download" style="display:none">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            PPT 다운로드
          </a>
          <div class="answer-row">
            <input type="text" id="ans-input" placeholder="답을 입력하세요" onkeydown="if(event.key==='Enter')submit()">
            <button onclick="submit()">제출</button>
          </div>
          <div id="ans-msg"></div>
        </div>

        <div id="g-done" class="center" style="display:none;padding:2rem 0">
          <h1 style="font-size:18px">끝!</h1>
        </div>
      </div>

      <div id="panel-mypage" style="display:none">
        <div style="margin-bottom:1.25rem">
          <div style="font-size:13px;color:var(--text-sub);margin-bottom:8px;font-weight:500">화면 테마</div>
          <div style="display:flex;gap:8px">
            <button class="secondary" id="theme-light-btn" onclick="setTheme('light')" style="flex:1">☀️ 라이트</button>
            <button class="secondary" id="theme-dark-btn" onclick="setTheme('dark')" style="flex:1">🌙 다크</button>
          </div>
        </div>
        <div>
          <div style="font-size:13px;color:var(--text-sub);margin-bottom:8px;font-weight:500">최근 푼 문제</div>
          <div id="history-list"><p class="sub" style="margin:0">아직 푼 문제가 없어요</p></div>
        </div>
      </div>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove, get } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

const ADMIN_URL = "https://orca1234.github.io/quiz-admin";

const firebaseConfig = {
  apiKey: "AIzaSyCiTZ2OXhz-iBxmj2jO7H4P1s3B-3FfifM",
  authDomain: "mathtime-32f04.firebaseapp.com",
  databaseURL: "https://mathtime-32f04-default-rtdb.firebaseio.com",
  projectId: "mathtime-32f04",
  storageBucket: "mathtime-32f04.firebasestorage.app",
  messagingSenderId: "109741787829",
  appId: "1:109741787829:web:7fb09ac5c7dbe0262accfc"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let nick = '', problems = [], solved = 0, sessionActive = false, history = {};
let unsubSession, unsubProblems, unsubPlayer, unsubMessages;
let seenMessageKeys = new Set();

// 테마
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const tb = document.getElementById('theme-toggle');
  if (tb) tb.textContent = theme === 'dark' ? '☀️' : '🌙';
  localStorage.setItem('quiz-player-theme', theme);
  const lb = document.getElementById('theme-light-btn');
  const dbtn = document.getElementById('theme-dark-btn');
  if (lb && dbtn) {
    lb.style.background = theme === 'light' ? 'var(--text)' : 'var(--card)';
    lb.style.color = theme === 'light' ? 'var(--bg)' : 'var(--text)';
    dbtn.style.background = theme === 'dark' ? 'var(--text)' : 'var(--card)';
    dbtn.style.color = theme === 'dark' ? 'var(--bg)' : 'var(--text)';
  }
}
window.toggleTheme = () => {
  const current = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
  applyTheme(current === 'dark' ? 'light' : 'dark');
};
window.setTheme = (theme) => applyTheme(theme);
applyTheme(localStorage.getItem('quiz-player-theme') || 'light');

window.switchTab = (tab) => {
  document.getElementById('panel-quiz').style.display = tab === 'quiz' ? '' : 'none';
  document.getElementById('panel-mypage').style.display = tab === 'mypage' ? '' : 'none';
  document.getElementById('tab-quiz').classList.toggle('active', tab === 'quiz');
  document.getElementById('tab-mypage').classList.toggle('active', tab === 'mypage');
};

function showScreen(id) {
  ['screen-login','screen-signup','screen-redirect','screen-game'].forEach(s => {
    document.getElementById(s).style.display = s === id ? '' : 'none';
  });
}

window.showSignup = () => { showScreen('screen-signup'); document.getElementById('signup-msg').innerHTML=''; };
window.showLogin = () => { showScreen('screen-login'); document.getElementById('login-msg').innerHTML=''; };

// 간단 해시 (평문 저장 방지용, 보안 등급용 아님)
function simpleHash(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = (hash << 5) - hash + str.charCodeAt(i);
    hash |= 0;
  }
  return hash.toString();
}

window.doSignup = async () => {
  const n = document.getElementById('signup-nick').value.trim();
  const p = document.getElementById('signup-pw').value;
  const msg = document.getElementById('signup-msg');
  if (!n || !p) { msg.innerHTML = '<div class="msg msg-err">닉네임과 비밀번호를 입력해주세요</div>'; return; }
  if (n === 'admin') { msg.innerHTML = '<div class="msg msg-err">사용할 수 없는 닉네임이에요</div>'; return; }
  const snap = await get(ref(db, 'accounts/' + n));
  if (snap.val()) { msg.innerHTML = '<div class="msg msg-err">이미 사용 중인 닉네임이에요</div>'; return; }
  await set(ref(db, 'accounts/' + n), { pw: simpleHash(p) });
  await set(ref(db, 'players/' + n), { solved: 0 });
  msg.innerHTML = '<div class="msg msg-ok">가입 완료! 로그인해주세요</div>';
  setTimeout(() => { showLogin(); document.getElementById('login-nick').value = n; }, 1000);
};

window.doLogin = async () => {
  const n = document.getElementById('login-nick').value.trim();
  const p = document.getElementById('login-pw').value;
  const msg = document.getElementById('login-msg');
  if (!n || !p) { msg.innerHTML = '<div class="msg msg-err">닉네임과 비밀번호를 입력해주세요</div>'; return; }

  if (n === 'admin' && p === 'admin') {
    showScreen('screen-redirect');
    setTimeout(() => { window.location.href = ADMIN_URL; }, 800);
    return;
  }

  const snap = await get(ref(db, 'accounts/' + n));
  const account = snap.val();
  if (!account || account.pw !== simpleHash(p)) {
    msg.innerHTML = '<div class="msg msg-err">닉네임 또는 비밀번호가 틀렸어요</div>';
    return;
  }
  localStorage.setItem('quiz-player-nick', n);
  localStorage.setItem('quiz-player-pw', p);
  enterGame(n);
};

function enterGame(n) {
  nick = n;
  showScreen('screen-game');
  document.getElementById('g-name').textContent = nick + '님';
  startListeners();
}

function startListeners() {
  unsubProblems = onValue(ref(db, 'problems'), snap => {
    problems = snap.val() ? Object.values(snap.val()).sort((a,b) => a.num - b.num) : [];
    render();
  });
  unsubSession = onValue(ref(db, 'session/active'), snap => {
    sessionActive = snap.val() || false;
    render();
  });
  unsubPlayer = onValue(ref(db, 'players/' + nick), snap => {
    const val = snap.val() || {};
    solved = val.solved || 0;
    history = val.history || {};
    render();
    renderHistory();
  });
  unsubMessages = onValue(ref(db, 'messages/' + nick), snap => {
    const data = snap.val();
    if (!data) return;
    Object.entries(data).forEach(([key, m]) => {
      if (!seenMessageKeys.has(key)) {
        seenMessageKeys.add(key);
        showToast(m.text);
      }
    });
  });
}

function showToast(text) {
  const el = document.createElement('div');
  el.className = 'msg-toast';
  el.textContent = '메시지: ' + text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

function renderHistory() {
  const el = document.getElementById('history-list');
  const items = Object.values(history).sort((a,b) => a.num - b.num);
  if (!items.length) { el.innerHTML = '<p class="sub" style="margin:0">아직 푼 문제가 없어요</p>'; return; }
  el.innerHTML = items.map(h => `
    <div class="history-item">
      <span class="history-num">${h.num}번</span>
      <span class="history-ans">제출한 답: ${h.answer}</span>
    </div>
  `).join('');
}

function render() {
  document.getElementById('g-badge').textContent = solved + '/' + problems.length + ' 완료';
  const waiting = document.getElementById('g-waiting');
  const active = document.getElementById('g-active');
  const done = document.getElementById('g-done');

  if (!sessionActive) {
    waiting.style.display=''; active.style.display='none'; done.style.display='none'; return;
  }
  if (problems.length > 0 && solved >= problems.length) {
    waiting.style.display='none'; active.style.display='none'; done.style.display=''; return;
  }
  const prob = problems[solved];
  if (!prob) { waiting.style.display=''; active.style.display='none'; done.style.display='none'; return; }

  waiting.style.display='none'; active.style.display=''; done.style.display='none';
  document.getElementById('g-prob-label').textContent = '문제 ' + (solved+1) + ' / ' + problems.length;
  document.getElementById('g-prob-name').textContent = prob.name;

  const dlBtn = document.getElementById('g-download');
  if (prob.fileLink) {
    dlBtn.style.display = 'flex';
    dlBtn.href = prob.fileLink;
  } else {
    dlBtn.style.display = 'none';
  }

  document.getElementById('ans-input').value = '';
  document.getElementById('ans-msg').innerHTML = '';
}

window.submit = async () => {
  const rawVal = document.getElementById('ans-input').value.trim();
  const val = rawVal.toLowerCase().replace(/\s/g,'');
  const msg = document.getElementById('ans-msg');
  if (!val) return;
  const prob = problems[solved];
  if (!prob) return;
  if (val === prob.answer) {
    await set(ref(db, `players/${nick}/history/${prob.id}`), { num: prob.num, answer: rawVal });
    await set(ref(db, 'players/' + nick + '/solved'), solved + 1);
    msg.innerHTML = '<div class="msg msg-ok">정답!</div>';
  } else {
    msg.innerHTML = `<div class="msg msg-err">땡!${prob.hint ? ' 힌트: ' + prob.hint : ''}</div>`;
  }
};

window.logout = async () => {
  if (unsubSession) unsubSession();
  if (unsubProblems) unsubProblems();
  if (unsubPlayer) unsubPlayer();
  if (unsubMessages) unsubMessages();
  // 세션 활성 표시(어드민 현황)에서만 제외하고 계정/기록은 유지하고 싶다면 players 노드는 남겨둠
  // 여기서는 "현재 접속 중" 목적의 players 노드를 그대로 두되 로컬 로그인 정보만 삭제
  localStorage.removeItem('quiz-player-nick');
  localStorage.removeItem('quiz-player-pw');
  nick = ''; problems = []; solved = 0; history = {}; seenMessageKeys = new Set();
  document.getElementById('login-nick').value = '';
  document.getElementById('login-pw').value = '';
  showLogin();
  switchTab('quiz');
};

// 자동 로그인
(async () => {
  const savedNick = localStorage.getItem('quiz-player-nick');
  const savedPw = localStorage.getItem('quiz-player-pw');
  if (savedNick && savedPw) {
    const snap = await get(ref(db, 'accounts/' + savedNick));
    const account = snap.val();
    if (account && account.pw === simpleHash(savedPw)) {
      enterGame(savedNick);
      return;
    } else {
      localStorage.removeItem('quiz-player-nick');
      localStorage.removeItem('quiz-player-pw');
    }
  }
  showLogin();
})();
</script>
</body>
</html>
